# ─────────────────────────────────────────────
#  Crop Disease Classifier — Configuration
# ─────────────────────────────────────────────

data:
  root_dir: "data/processed"
  image_size: 380          # EfficientNet-B4 native resolution
  num_classes: 10          # Adjust to your dataset
  train_split: 0.80
  val_split:   0.10
  num_workers: 0

model:
  backbone: "efficientnet_b4"
  pretrained: true
  dropout: 0.4
  label_smoothing: 0.1

training:
  epochs: 1
  batch_size: 2
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 0
  scheduler: "cosine"      # cosine | step | plateau
  mixed_precision: true
  gradient_clip: 1.0
  early_stopping_patience: 8
  save_top_k: 3

augmentation:
  # Training augmentations (heavy)
  random_resized_crop: true
  horizontal_flip: 0.5
  vertical_flip: 0.3
  rotate_limit: 30
  brightness_contrast: 0.3
  hue_saturation: 0.2
  gaussian_blur: 0.2
  cutout_prob: 0.5
  cutout_num_holes: 8
  cutout_max_size: 30
  mixup_alpha: 0.4         # 0.0 to disable
  # Validation/Test (light — only resize + normalize)
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std:  [0.229, 0.224, 0.225]

paths:
  checkpoint_dir: "outputs/checkpoints"
  report_dir: "outputs/reports"
  log_file: "outputs/train.log"

classes:
  # PlantVillage-style class names — edit to match your dataset
  - Healthy
  - Bacterial_Blight
  - Brown_Spot
  - Blast_Fungus
  - Leaf_Scald
  - Sheath_Rot
  - False_Smut
  - Tungro_Virus
  - Narrow_Brown_Spot
  - Sheath_Blight
